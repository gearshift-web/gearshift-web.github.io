<!DOCTYPE html>
<html>
<head>
<title>BMW i7 | Gearshift</title>
<style>
body { margin:0; font-family:'Segoe UI'; background:linear-gradient(135deg,#0f0f0f,#1c1c1c); color:white;}
header { text-align:center; padding:30px; background:black; font-size:28px; font-weight:bold; letter-spacing:2px;}
.model-hero { text-align:center; padding:40px 20px;}
.model-hero h1 { font-size:48px;}
.model-hero p { font-size:18px; color:#bbb;}
.model-image { width:80%; max-width:800px; border-radius:15px; margin-top:20px; box-shadow:0px 10px 30px rgba(0,0,0,0.6);}
.spec-section { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; padding:40px;}
.spec-card { background:#1f1f1f; padding:25px; border-radius:15px; text-align:center; transition:0.3s;}
.spec-card:hover { transform:translateY(-8px); background:#131313;}
.spec-card h2 { font-size:22px; margin-bottom:10px; color:#00bfff;}
.spec-card p { font-size:18px; font-weight:bold;}
footer { text-align:center; padding:20px; background:black; color:gray;}
@media(max-width:900px){.spec-section{grid-template-columns:1fr;} .model-hero h1{font-size:36px;}}
</style>
</head>
<body>

<header>GEARSHIFT</header>

<section class="model-hero">
<h1>BMW i7</h1>
<p>Electric Luxury. Silent Power.</p>
<img src="https://upload.wikimedia.org/wikipedia/commons/8/8e/BMW_i7_xDrive60_IMG_5516.jpg" class="model-image">
</section>

<section class="spec-section">
<div class="spec-card"><h2>Powertrain</h2><p>Dual Electric Motors</p></div>
<div class="spec-card"><h2>Horsepower</h2><p>536 HP</p></div>
<div class="spec-card"><h2>0-100 km/h</h2><p>4.7 Seconds</p></div>
<div class="spec-card"><h2>Range</h2><p>~480 km</p></div>
<div class="spec-card"><h2>Drive Type</h2><p>AWD</p></div>
<div class="spec-card"><h2>Launch Year</h2><p>2022</p></div>
</section>

<footer>© 2026 Gearshift | Designed by Tcar Editz 🚗</footer>

</body>
</html>
