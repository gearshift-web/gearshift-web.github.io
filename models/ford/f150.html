<!DOCTYPE html>
<html>
<head>
<title>Ford F-150 | Gearshift</title>
<style>
/* SAME STYLE */
body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f0f0f,#1c1c1c);color:white;}
header{text-align:center;padding:30px;background:black;font-size:28px;font-weight:bold;letter-spacing:2px;}
.model-hero{text-align:center;padding:40px 20px;}
.model-hero h1{font-size:48px;margin-bottom:10px;}
.model-hero p{font-size:18px;color:#bbb;}
.model-image{width:80%;max-width:800px;border-radius:15px;margin-top:20px;box-shadow:0 10px 30px rgba(0,0,0,0.6);}
.spec-section{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:40px;}
.spec-card{background:#1f1f1f;padding:25px;border-radius:15px;text-align:center;transition:0.3s;}
.spec-card:hover{transform:translateY(-8px);background:#292929;}
.spec-card h2{font-size:22px;margin-bottom:10px;color:#00bfff;}
.spec-card p{font-size:18px;font-weight:bold;}
footer{text-align:center;padding:20px;background:black;color:gray;}
@media(max-width:900px){.spec-section{grid-template-columns:1fr;} .model-hero h1{font-size:36px;}}
</style>
</head>
<body>
<header>GEARSHIFT</header>
<section class="model-hero">
<h1>F-150</h1>
<p>America’s Best-Selling Pickup</p>
<img src="https://upload.wikimedia.org/wikipedia/commons/0/0c/2021_Ford_F-150_Lariat.jpg" class="model-image">
</section>
<section class="spec-section">
<div class="spec-card"><h2>Engine</h2><p>3.5L EcoBoost V6</p></div>
<div class="spec-card"><h2>Horsepower</h2><p>400 HP</p></div>
<div class="spec-card"><h2>Torque</h2><p>678 Nm</p></div>
<div class="spec-card"><h2>Transmission</h2><p>10-Speed Automatic</p></div>
<div class="spec-card"><h2>Drive Type</h2><p>RWD / 4WD</p></div>
<div class="spec-card"><h2>Launch Year</h2><p>1948</p></div>
</section>
<footer>© 2026 Gearshift | Designed by Tcar Editz 🚗</footer>
</body>
</html>
